services:
  - type: web
    name: medi-remind-api
    env: node
    branch: main
    rootDir: backend
    buildCommand: |
      npm install --include=dev
      npm run build
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://medicine-reminder-system-mdpb.vercel.app
      - key: CLIENT_URL
        value: https://medicine-reminder-system-mdpb.vercel.app
      - key: MONGO_URI
        sync: false
